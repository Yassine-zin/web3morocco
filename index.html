<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Web3Morocco</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#07111f,#0c1c34,#11284d);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
font-size:44px;
text-align:center;
margin-top:10px;
}

h1{
text-align:center;
font-size:34px;
margin-top:10px;
}

.sub{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

.search{
background:rgba(255,255,255,.08);
padding:16px;
border-radius:18px;
margin-bottom:20px;
}

select,input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:14px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
margin-bottom:14px;
}

.mainbtn{background:#16a34a;}
.workerbtn{background:#2563eb;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

.card{
background:rgba(255,255,255,.08);
padding:18px;
border-radius:18px;
text-align:center;
font-size:16px;
}

.footer{
text-align:center;
opacity:.7;
font-size:13px;
margin-top:25px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🇲🇦⚡</div>

<h1>Web3Morocco</h1>

<div class="sub">
All Moroccan Services In One App
</div>

<div class="search">

<select>
<option>Choose City</option>
<option>Casablanca</option>
<option>Rabat</option>
<option>Agadir</option>
<option>Fes</option>
<option>Marrakech</option>
<option>Tanger</option>
</select>

<input type="text" placeholder="What service do you need?">

<button class="mainbtn">
طلب خدمة الآن
</button>

<button class="workerbtn">
سجل كمقدم خدمة
</button>

</div>

<div class="grid">

<div class="card">🔧 Carpenter</div>
<div class="card">🚗 Mechanic</div>
<div class="card">🧹 Cleaning</div>
<div class="card">💻 App Developer</div>
<div class="card">📈 Marketing</div>
<div class="card">🚚 Delivery</div>
<div class="card">🏠 Home Repair</div>
<div class="card">📦 Other Services</div>

</div>

<div class="footer">
Powered by Pi Network • Web3Morocco.pi
</div>

</div>

</body>
</html>
