<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Web3Morocco</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#06101d,#0d1d34,#13294b);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:520px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:15px;
}

select, input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
outline:none;
}

.lang{
width:38%;
}

.city{
width:62%;
}

.logo{
text-align:center;
font-size:46px;
margin-top:5px;
}

h1{
text-align:center;
font-size:34px;
margin-top:8px;
}

.sub{
text-align:center;
opacity:.85;
margin-bottom:22px;
font-size:15px;
}

.searchbox{
background:rgba(255,255,255,.08);
padding:16px;
border-radius:18px;
margin-bottom:18px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
margin-top:10px;
}

.book{background:#16a34a;}
.worker{background:#2563eb;}
.contact{background:#22c55e;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:18px;
}

.card{
background:rgba(255,255,255,.08);
padding:18px;
border-radius:18px;
text-align:center;
font-size:15px;
}

.status{
margin-top:18px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.08);
text-align:center;
font-size:15px;
}

.footer{
text-align:center;
margin-top:22px;
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<select class="lang" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="ar">العربية</option>
<option value="fr">Français</option>
</select>

<select class="city">
<option>Casablanca</option>
<option>Agadir</option>
</select>
</div>

<div class="logo">🇲🇦⚡</div>

<h1 id="title">Web3Morocco</h1>

<div class="sub" id="subtitle">
All Moroccan Services In One App
</div>

<div class="searchbox">

<input type="text" id="serviceInput" placeholder="What service do you need?">

<button class="book" onclick="bookService()" id="btn1">
Request Service Now
</button>

<button class="worker" onclick="registerWorker()" id="btn2">
Register as Worker
</button>

<button class="contact" onclick="contactUs()" id="btn3">
WhatsApp Contact
</button>

</div>

<div class="grid">

<div class="card">🔧 Carpenter</div>
<div class="card">🚗 Mechanic</div>
<div class="card">🧹 Cleaning</div>
<div class="card">💻 App Developer</div>
<div class="card">📈 Marketing</div>
<div class="card">🚚 Delivery</div>
<div class="card">🏠 Home Repair</div>
<div class="card">📦 Other Services</div>

</div>

<div class="status" id="status">
Welcome to the future of Moroccan services
</div>

<div class="footer">
Powered by Pi Network • Web3Morocco.pi
</div>

</div>

<script>
const phone = "212669249194";

function bookService(){
let service = document.getElementById("serviceInput").value;
if(service==""){service="Service Request";}
window.open("https://wa.me/"+phone+"?text=Hello, I need: "+encodeURIComponent(service),"_blank");
}

function registerWorker(){
window.open("https://wa.me/"+phone+"?text=Hello, I want to register as a worker on Web3Morocco","_blank");
}

function contactUs(){
window.open("https://wa.me/"+phone,"_blank");
}

function changeLang(lang){

if(lang=="ar"){
document.getElementById("subtitle").innerText="جميع الخدمات المغربية في تطبيق واحد";
document.getElementById("serviceInput").placeholder="ما الخدمة التي تحتاجها؟";
document.getElementById("btn1").innerText="طلب خدمة الآن";
document.getElementById("btn2").innerText="سجل كمقدم خدمة";
document.getElementById("btn3").innerText="تواصل واتساب";
document.getElementById("status").innerText="مرحبا بك في مستقبل الخدمات المغربية";
}

if(lang=="fr"){
document.getElementById("subtitle").innerText="Tous les services marocains dans une seule application";
document.getElementById("serviceInput").placeholder="Quel service cherchez-vous ?";
document.getElementById("btn1").innerText="Demander un service";
document.getElementById("btn2").innerText="S'inscrire comme prestataire";
document.getElementById("btn3").innerText="Contact WhatsApp";
document.getElementById("status").innerText="Bienvenue dans le futur des services marocains";
}

if(lang=="en"){
document.getElementById("subtitle").innerText="All Moroccan Services In One App";
document.getElementById("serviceInput").placeholder="What service do you need?";
document.getElementById("btn1").innerText="Request Service Now";
document.getElementById("btn2").innerText="Register as Worker";
document.getElementById("btn3").innerText="WhatsApp Contact";
document.getElementById("status").innerText="Welcome to the future of Moroccan services";
}

}
</script>

</body>
</html>
