<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Web3Morocco</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#06101d,#0d1d34,#13294b);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:520px;
margin:auto;
}

.logo{
text-align:center;
font-size:46px;
margin-top:5px;
}

h1{
text-align:center;
font-size:34px;
margin-top:8px;
}

.sub{
text-align:center;
opacity:.85;
margin-bottom:20px;
font-size:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
margin-bottom:12px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
margin-bottom:10px;
}

.main{background:#16a34a;}
.worker{background:#2563eb;}
.contact{background:#22c55e;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.card{
background:rgba(255,255,255,.08);
padding:18px;
border-radius:18px;
text-align:center;
font-size:15px;
cursor:pointer;
transition:.2s;
}

.card:active{
transform:scale(.96);
}

.status{
margin-top:18px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.08);
text-align:center;
font-size:15px;
}

.footer{
text-align:center;
margin-top:20px;
opacity:.7;
font-size:13px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
background:#0f1e38;
padding:24px;
border-radius:20px;
width:100%;
max-width:360px;
text-align:center;
}

.box h3{
margin-bottom:12px;
}

.box p{
opacity:.85;
margin-bottom:16px;
}

.box button{
margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🇲🇦⚡</div>

<h1>Web3Morocco</h1>

<div class="sub">All Moroccan Services In One App</div>

<input type="text" id="serviceInput" placeholder="What service do you need?">

<button class="main" onclick="requestNow()">Request Service Now</button>
<button class="worker" onclick="worker()">Register as Worker</button>
<button class="contact" onclick="openWA('General Contact')">WhatsApp Contact</button>

<div class="grid">

<div class="card" onclick="service('Carpenter')">🔧 Carpenter</div>
<div class="card" onclick="service('Mechanic')">🚗 Mechanic</div>
<div class="card" onclick="service('Cleaning')">🧹 Cleaning</div>
<div class="card" onclick="service('App Developer')">💻 App Developer</div>
<div class="card" onclick="service('Marketing')">📈 Marketing</div>
<div class="card" onclick="service('Delivery')">🚚 Delivery</div>
<div class="card" onclick="service('Home Repair')">🏠 Home Repair</div>
<div class="card" onclick="service('Other Services')">📦 Other Services</div>

</div>

<div class="status" id="status">Welcome to Web3Morocco</div>

<div class="footer">Powered by Pi Network • Web3Morocco.pi</div>

</div>

<div class="popup" id="popup">
<div class="box">
<h3 id="popTitle">Service</h3>
<p id="popText">Ready to connect you.</p>
<button class="main" onclick="goNow()">Continue to WhatsApp</button>
<button class="worker" onclick="closePop()">Close</button>
</div>
</div>

<script>
const phone="212669249194";
let selectedService="";

function openWA(text){
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent("Hello, I need: "+text),"_blank");
}

function requestNow(){
let txt=document.getElementById("serviceInput").value;
if(txt==""){txt="General Service";}
service(txt);
}

function worker(){
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent("Hello, I want to register as a worker on Web3Morocco"),"_blank");
}

function service(name){
selectedService=name;
document.getElementById("popTitle").innerText=name;
document.getElementById("popText").innerText="We found your request. Continue to WhatsApp now.";
document.getElementById("popup").style.display="flex";
document.getElementById("status").innerText=name+" selected";
}

function closePop(){
document.getElementById("popup").style.display="none";
}

function goNow(){
closePop();
openWA(selectedService);
}
</script>

</body>
</html>
