<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Web3Morocco</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#06101d;
color:white;
padding:20px;
}

.container{max-width:520px;margin:auto}

h1{text-align:center}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.login{background:#2563eb}
.pay{background:#16a34a}
.wa{background:#22c55e}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.item{
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

#status{
margin-top:15px;
text-align:center;
opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>🇲🇦 Web3Morocco</h1>

<div class="card">
👤 User: <span id="user">Guest</span><br>
💎 Status: Free
</div>

<button class="login" onclick="loginPi()">Login with Pi</button>

<button class="pay" onclick="premium()">Unlock Premium (0.1 π)</button>

<button class="wa" onclick="wa()">WhatsApp Support</button>

<div class="grid">

<div class="item" onclick="service('Carpenter')">🔧 Carpenter</div>
<div class="item" onclick="service('Mechanic')">🚗 Mechanic</div>
<div class="item" onclick="service('Cleaning')">🧹 Cleaning</div>
<div class="item" onclick="service('Developer')">💻 Developer</div>
<div class="item" onclick="service('Marketing')">📈 Marketing</div>
<div class="item" onclick="service('Delivery')">🚚 Delivery</div>

</div>

<div id="status">Ready</div>

</div>

<script>
const phone="212669249194";
let currentUser="Guest";

function loginPi(){
Pi.init({ version:"2.0", sandbox:true });

Pi.authenticate(["username","payments"], function(payment){
console.log(payment);
}).then(auth=>{
currentUser=auth.user.username;
document.getElementById("user").innerText=currentUser;
document.getElementById("status").innerText="Logged in as "+currentUser;
}).catch(()=>{
document.getElementById("status").innerText="Login failed";
});
}

function premium(){
const paymentData={
amount:0.1,
memo:"Premium Access Web3Morocco",
metadata:{type:"premium"}
};

Pi.createPayment(paymentData,
function(paymentId){
document.getElementById("status").innerText="Payment started...";
},
function(paymentId){
document.getElementById("status").innerText="Premium activated!";
},
function(error){
document.getElementById("status").innerText="Payment cancelled";
}
);
}

function wa(){
window.open("https://wa.me/"+phone,"_blank");
}

function service(name){
document.getElementById("status")="Selected: "+name;
window.open("https://wa.me/"+phone+"?text=I need "+name,"_blank");
}
</script>

</body>
</html>
